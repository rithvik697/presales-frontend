<div class="page-container">
  <div class="page-header">
    <h2>Project Registration</h2>
    <span class="subtitle">Create projects to run ads and capture leads</span>
  </div>

  <div class="card">
    <form (ngSubmit)="submitProject()" #projectForm="ngForm">

      <!-- BASIC DETAILS -->
      <div class="section">
        <h3>Basic Details</h3>

        <div class="grid">
          <div class="form-row">
            <label>Project Name</label>
            <input
              type="text"
              [(ngModel)]="projectData.project_name"
              name="project_name"
              required
            />
          </div>

          <div class="form-row">
            <label>Project Type</label>
            <select
              [(ngModel)]="projectData.project_type"
              name="project_type"
              required
            >
              <option value="">Select Type</option>
              <option *ngFor="let type of projectTypes" [value]="type">
                {{ type }}
              </option>
            </select>
          </div>

          <div class="form-row">
            <label>Project Status</label>
            <select
              [(ngModel)]="projectData.status"
              name="status"
              required
            >
              <option value="">Select Status</option>
              <option *ngFor="let status of projectStatuses" [value]="status">
                {{ status }}
              </option>
            </select>
          </div>

          <div class="form-row">
            <label>RERA Number</label>
            <input
              type="text"
              [(ngModel)]="projectData.rera_number"
              name="rera_number"
            />
          </div>
        </div>
      </div>

      <!-- LOCATION -->
      <div class="section">
        <h3>Location</h3>

        <div class="grid">
          <div class="form-row full">
            <label>Address</label>
            <input
              type="text"
              [(ngModel)]="projectData.address_line_1"
              name="address_line_1"
            />
          </div>

          <div class="form-row">
            <label>City</label>
            <input
              type="text"
              [(ngModel)]="projectData.city"
              name="city"
            />
          </div>

          <div class="form-row">
            <label>State</label>
            <input
              type="text"
              [(ngModel)]="projectData.state"
              name="state"
            />
          </div>

          <div class="form-row">
            <label>Pincode</label>
            <input
              type="text"
              maxlength="6"
              [(ngModel)]="projectData.pincode"
              name="pincode"
            />
          </div>
        </div>
      </div>

      <!-- PROJECT SIZE -->
      <div class="section">
        <h3>Project Size</h3>

        <div class="grid">
          <div class="form-row">
            <label>Total Area (sq ft)</label>
            <input
              type="number"
              [(ngModel)]="projectData.total_area"
              name="total_area"
            />
          </div>

          <div class="form-row">
            <label>Number of Units</label>
            <input
              type="number"
              [(ngModel)]="projectData.number_of_units"
              name="number_of_units"
            />
          </div>
        </div>
      </div>

      <!-- ERRORS -->
      <div class="error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- ACTIONS -->
      <div class="form-actions">
        <button
          type="submit"
          [disabled]="isSubmitting || projectForm.invalid"
        >
          {{ isSubmitting ? 'Saving...' : 'Create Project' }}
        </button>
      </div>

    </form>
  </div>
</div>
