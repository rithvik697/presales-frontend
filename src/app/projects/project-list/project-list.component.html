<div class="users-list-container">

  <!-- ================= BREADCRUMB ================= -->
  <div class="breadcrumb-container">
    <i class="pi pi-home"></i>
    <span class="separator">›</span>
    <span class="current">Projects</span>
  </div>

  <!-- ================= HEADER ================= -->
  <div class="users-header">
    <h2>Projects</h2>

    <button class="add-user-btn" (click)="goToRegister()">
      + Register Project
    </button>
  </div>

  <!-- ================= TABLE ================= -->
  <div class="table-wrapper">

    <p-table
      #dt
      [value]="projects"
      [paginator]="true"
      [rows]="5"
      [scrollable]="true"
      scrollDirection="horizontal"
      sortMode="multiple"
      responsiveLayout="scroll"
      class="users-table"
    >

      <!-- ================= HEADER ================= -->
      <ng-template pTemplate="header">
        <tr>

          <th class="serial-col">
            #
          </th>

          <th pSortableColumn="project_name">
            Project Name
            <p-sortIcon field="project_name"></p-sortIcon>
          </th>

          <th pSortableColumn="project_type">
            Type
            <p-sortIcon field="project_type"></p-sortIcon>
          </th>

          <th pSortableColumn="status">
            Status
            <p-sortIcon field="status"></p-sortIcon>
          </th>

          <th pSortableColumn="city">
            City
            <p-sortIcon field="city"></p-sortIcon>
          </th>

          <th pSortableColumn="created_on">
            Created On
            <p-sortIcon field="created_on"></p-sortIcon>
          </th>

        </tr>

        <!-- ================= FILTER ROW ================= -->
        <tr>

          <th class="serial-col"></th>

          <th>
            <input pInputText
                   #projectName
                   (input)="dt.filter(projectName.value, 'project_name', 'contains')" />
          </th>

          <th>
            <input pInputText
                   #type
                   (input)="dt.filter(type.value, 'project_type', 'contains')" />
          </th>

          <th>
            <input pInputText
                   #status
                   (input)="dt.filter(status.value, 'status', 'contains')" />
          </th>

          <th>
            <input pInputText
                   #city
                   (input)="dt.filter(city.value, 'city', 'contains')" />
          </th>

          <th></th>

        </tr>
      </ng-template>

      <!-- ================= BODY ================= -->
      <ng-template pTemplate="body" let-project let-rowIndex="rowIndex">
        <tr>

          <td class="serial-col">
            {{ rowIndex + 1 }}
          </td>

          <td>{{ project.project_name }}</td>
          <td>{{ project.project_type }}</td>

          <td>
            <span
              [class.active]="project.status === 'Active'"
              [class.inactive]="project.status !== 'Active'">
              {{ project.status }}
            </span>
          </td>

          <td>{{ project.city }}</td>

          <td>
            {{ project.created_on | date:'dd-MMM-yyyy' }}
          </td>

        </tr>
      </ng-template>

      <!-- ================= EMPTY ================= -->
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="empty-state">
            No projects registered yet.
          </td>
        </tr>
      </ng-template>

    </p-table>

  </div>

</div>
