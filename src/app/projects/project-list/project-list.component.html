<div class="page-container">

  <p-toolbar class="mb-3">
    <div class="p-toolbar-group-left">
      <h2 class="m-0">Projects</h2>
    </div>

    <div class="p-toolbar-group-right">
      <button
        pButton
        label=" Register Project"
        icon="pi pi-plus"
        class="p-button-primary"
        (click)="goToRegister()"
      ></button>
    </div>
  </p-toolbar>

  <p-table
    *ngIf="!loading"
    [value]="projects"
    [paginator]="true"
    [rows]="5"
    [rowsPerPageOptions]="[5,10,20]"
    responsiveLayout="scroll"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} projects"
  >

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="project_name">
          Project Name <p-sortIcon field="project_name"></p-sortIcon>
        </th>

        <th pSortableColumn="project_type">
          Type <p-sortIcon field="project_type"></p-sortIcon>
        </th>

        <th>Status</th>

        <th pSortableColumn="city">
          City <p-sortIcon field="city"></p-sortIcon>
        </th>

        <th pSortableColumn="created_on">
          Created On <p-sortIcon field="created_on"></p-sortIcon>
        </th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-project>
      <tr>
        <td>{{ project.project_name }}</td>
        <td>{{ project.project_type }}</td>

        <td>
          <p-tag
            [value]="project.status"
            [severity]="getStatusSeverity(project.status)"
          ></p-tag>
        </td>

        <td>{{ project.city }}</td>
        <td>{{ project.created_on | date:'dd MMM yyyy' }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center">
          No projects registered yet.
        </td>
      </tr>
    </ng-template>

  </p-table>

</div>
