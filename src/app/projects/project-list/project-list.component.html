<div class="page-container">

  <!-- Breadcrumb -->
  <p-breadcrumb
    [model]="breadcrumbItems"
    [home]="home"
    class="mb-3">
  </p-breadcrumb>

  <!-- Toolbar -->
  <p-toolbar class="mb-3">
    <div class="p-toolbar-group-left">
      <h2 class="m-0">Projects</h2>
    </div>

    <div class="p-toolbar-group-right">
      <button
        pButton
        label="Register Project"
        icon="pi pi-plus"
        class="p-button-primary"
        (click)="goToRegister()">
      </button>
    </div>
  </p-toolbar>

  <!-- Scroll Wrapper -->
  <div class="table-wrapper">

    <p-table
      #dt
      *ngIf="!loading"
      [value]="projects"
      [paginator]="true"
      [rows]="5"
      sortMode="multiple"
      class="projects-table"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
    >

      <!-- HEADER -->
      <ng-template pTemplate="header">
        <tr>

          <!-- SL NO -->
          <th style="width:70px">#</th>

          <!-- PROJECT NAME -->
          <th pSortableColumn="project_name">
            <div class="header-cell">
              <span>Project Name</span>
              <p-sortIcon field="project_name"></p-sortIcon>
            </div>
            <div class="filter-icon">
              <p-columnFilter
                field="project_name"
                display="menu"
                type="text">
              </p-columnFilter>
            </div>
          </th>

          <!-- PROJECT TYPE -->
          <th pSortableColumn="project_type">
            <div class="header-cell">
              <span>Type</span>
              <p-sortIcon field="project_type"></p-sortIcon>
            </div>
            <div class="filter-icon">
              <p-columnFilter
                field="project_type"
                display="menu"
                type="text">
              </p-columnFilter>
            </div>
          </th>

          <!-- STATUS -->
          <th pSortableColumn="status">
            <div class="header-cell">
              <span>Status</span>
              <p-sortIcon field="status"></p-sortIcon>
            </div>
            <div class="filter-icon">
              <p-columnFilter
                field="status"
                display="menu"
                type="text">
              </p-columnFilter>
            </div>
          </th>

          <!-- CITY -->
          <th pSortableColumn="city">
            <div class="header-cell">
              <span>City</span>
              <p-sortIcon field="city"></p-sortIcon>
            </div>
            <div class="filter-icon">
              <p-columnFilter
                field="city"
                display="menu"
                type="text">
              </p-columnFilter>
            </div>
          </th>

          <!-- STATE -->
          <th pSortableColumn="state">
            <div class="header-cell">
              <span>State</span>
              <p-sortIcon field="state"></p-sortIcon>
            </div>
            <div class="filter-icon">
              <p-columnFilter
                field="state"
                display="menu"
                type="text">
              </p-columnFilter>
            </div>
          </th>

          <!-- CREATED ON -->
          <th pSortableColumn="created_on">
            <div class="header-cell">
              <span>Created On</span>
              <p-sortIcon field="created_on"></p-sortIcon>
            </div>
            <div class="filter-icon">
              <p-columnFilter
                field="created_on"
                display="menu"
                type="text">
              </p-columnFilter>
            </div>
          </th>

          <!-- ACTION -->
          <th style="width:100px; text-align:center">Action</th>

        </tr>
      </ng-template>

      <!-- BODY -->
      <ng-template pTemplate="body" let-project let-rowIndex="rowIndex">
        <tr>

          <!-- SL NO -->
          <td>{{ dt.first + rowIndex + 1 }}</td>

          <td>
            <a class="project-name-link" (click)="viewProjectDetails(project)">
              {{ project.project_name }}
            </a>
          </td>

          <td>{{ project.project_type }}</td>

          <td>
            <p-tag
              [value]="formatStatus(project.status)"
              [severity]="getStatusSeverity(project.status)">
            </p-tag>
          </td>

          <td>{{ project.city }}</td>
          <td>{{ project.state }}</td>
          <td>{{ project.created_on | date:'dd-MMM-yyyy, HH:mm:ss' }}</td>

          <td>
            <p-button
              icon="pi pi-pencil"
              class="p-button-text p-button-primary p-button-sm"
              (onClick)="openEditDialog(project)">
            </p-button>
          </td>

        </tr>
      </ng-template>

      <!-- EMPTY -->
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="8" class="empty-state">
            No projects registered yet.
          </td>
        </tr>
      </ng-template>

    </p-table>

  </div>

</div>
