<div class="page-container">

  <div class="page-header">
    <h2>Projects</h2>
    <button (click)="goToRegister()">+ Register Project</button>
  </div>

  <div class="card" *ngIf="!loading">

    <table *ngIf="projects.length > 0">
      <thead>
        <tr>
          <th>Project Name</th>
          <th>Type</th>
          <th>Status</th>
          <th>City</th>
          <th>Created On</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let project of projects">
          <td>{{ project.project_name }}</td>
          <td>{{ project.project_type }}</td>
          <td>
            <span class="status" [ngClass]="project.status">
              {{ project.status }}
            </span>
          </td>
          <td>{{ project.city }}</td>
          <td>{{ project.created_on | date:'dd MMM yyyy' }}</td>
        </tr>
      </tbody>
    </table>

    <div class="empty" *ngIf="projects.length === 0">
      No projects registered yet.
    </div>

  </div>

</div>
