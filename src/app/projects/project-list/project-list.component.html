<div class="project-list-container">

  <!-- Breadcrumb -->
  <p-breadcrumb
    [model]="breadcrumbItems"
    [home]="home"
    class="mb-3">
  </p-breadcrumb>

  <!-- Toolbar -->
  <p-toolbar class="mb-3">
    <div class="p-toolbar-group-left">
      <h2 class="m-0">Projects</h2>
    </div>

    <div class="p-toolbar-group-right">
      <button
        pButton
        label="Register Project"
        icon="pi pi-plus"
        class="p-button-primary"
        (click)="goToRegister()">
      </button>
    </div>
  </p-toolbar>

  <!-- Projects Table -->
  <p-table
    #dt
    *ngIf="!loading"
    [value]="projects"
    [paginator]="true"
    [rows]="5"
    [rowsPerPageOptions]="[5,10,20]"
    responsiveLayout="scroll"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} projects"
    styleClass="crm-table"
  >

    <!-- HEADER -->
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="project_name">
          <div class="header-content">
            Project Name
            <p-sortIcon field="project_name"></p-sortIcon>
          </div>
        </th>

        <th pSortableColumn="project_type">
          <div class="header-content">
            Type
            <p-sortIcon field="project_type"></p-sortIcon>
          </div>
        </th>

        <th>Status</th>

        <th pSortableColumn="city">
          <div class="header-content">
            City
            <p-sortIcon field="city"></p-sortIcon>
          </div>
        </th>

        <th pSortableColumn="created_on">
          <div class="header-content">
            Created On
            <p-sortIcon field="created_on"></p-sortIcon>
          </div>
        </th>

        <th style="width: 100px">Actions</th>
      </tr>

      <!-- FILTER ROW -->
      <tr class="filter-row">
        <th>
          <input pInputText type="text"
            placeholder="Search name"
            (input)="dt.filter($any($event.target).value, 'project_name', 'contains')" />
        </th>
        <th>
          <input pInputText type="text"
            placeholder="Search type"
            (input)="dt.filter($any($event.target).value, 'project_type', 'contains')" />
        </th>
        <th>
          <input pInputText type="text"
            placeholder="Search status"
            (input)="dt.filter($any($event.target).value, 'status', 'contains')" />
        </th>
        <th>
          <input pInputText type="text"
            placeholder="Search city"
            (input)="dt.filter($any($event.target).value, 'city', 'contains')" />
        </th>
        <th></th>
        <th></th>
      </tr>
    </ng-template>

    <!-- BODY -->
    <ng-template pTemplate="body" let-project>
      <tr>
        <td>
          <a class="project-name-link" (click)="viewProjectDetails(project)">
            {{ project.project_name }}
          </a>
        </td>
        <td>{{ project.project_type }}</td>
        <td>
          <p-tag
            [value]="formatStatus(project.status)"
            [severity]="getStatusSeverity(project.status)">
          </p-tag>
        </td>
        <td>{{ project.city }}</td>
        <td>{{ project.created_on | date:'dd MMM yyyy' }}</td>
        <td class="text-center">
          <button
            pButton
            icon="pi pi-pencil"
            class="p-button-rounded p-button-text p-button-primary"
            (click)="openEditDialog(project)">
          </button>
        </td>
      </tr>
    </ng-template>

    <!-- EMPTY -->
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center">
          No projects registered yet.
        </td>
      </tr>
    </ng-template>

  </p-table>

</div>
