<div class="page-container">

  <!-- Breadcrumb -->
  <p-breadcrumb
    [model]="breadcrumbItems"
    [home]="home"
    class="mb-3">
  </p-breadcrumb>

  <h2 class="mb-3">Call Logs</h2>

  <p-table
    #dt
    [value]="callLogs"
    [paginator]="true"
    [rows]="5"
    [rowsPerPageOptions]="[5,10,20]"
    [loading]="loading"
    responsiveLayout="scroll"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} call logs"
    styleClass="crm-table"
  >

    <!-- HEADER -->
    <ng-template pTemplate="header">
      <tr>

        <th pSortableColumn="userName">
          <div class="header-content">
            User
            <p-sortIcon field="userName"></p-sortIcon>
          </div>
        </th>

        <th pSortableColumn="leadName">
          <div class="header-content">
            Lead
            <p-sortIcon field="leadName"></p-sortIcon>
          </div>
        </th>

        <th>Phone</th>

        <th pSortableColumn="callType">
          <div class="header-content">
            Type
            <p-sortIcon field="callType"></p-sortIcon>
          </div>
        </th>

        <th>Status</th>

        <th>Duration</th>

        <th pSortableColumn="callTime">
          <div class="header-content">
            Call Time
            <p-sortIcon field="callTime"></p-sortIcon>
          </div>
        </th>

        <th>Remarks</th>

      </tr>

      <!-- FILTER ROW -->
      <tr class="filter-row">

        <th>
          <input pInputText type="text"
            placeholder="Search user"
            (input)="dt.filter($any($event.target).value, 'userName', 'contains')" />
        </th>

        <th>
          <input pInputText type="text"
            placeholder="Search lead"
            (input)="dt.filter($any($event.target).value, 'leadName', 'contains')" />
        </th>

        <th></th>

        <th>
          <input pInputText type="text"
            placeholder="Search type"
            (input)="dt.filter($any($event.target).value, 'callType', 'contains')" />
        </th>

        <th>
          <input pInputText type="text"
            placeholder="Search status"
            (input)="dt.filter($any($event.target).value, 'callStatus', 'contains')" />
        </th>

        <th></th>

        <th>
          <input pInputText type="text"
            placeholder="Search time"
            (input)="dt.filter($any($event.target).value, 'callTime', 'contains')" />
        </th>

        <th></th>

      </tr>
    </ng-template>

    <!-- BODY -->
    <ng-template pTemplate="body" let-log>
      <tr>
        <td>{{ log.userName || '-' }}</td>
        <td>{{ log.leadName || '-' }}</td>
        <td>{{ log.phoneNumber || '-' }}</td>
        <td>{{ log.callType }}</td>

        <td>
          <p-tag
            [value]="log.callStatus"
            [severity]="getStatusSeverity(log.callStatus)">
          </p-tag>
        </td>

        <td>{{ log.callDuration }}</td>
        <td>{{ log.callTime | date:'dd-MMM-yyyy, HH:mm:ss' }}</td>
        <td>{{ log.remarks || '-' }}</td>
      </tr>
    </ng-template>

    <!-- EMPTY STATE -->
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="8" class="text-center">
          No call logs found.
        </td>
      </tr>
    </ng-template>

  </p-table>

</div>
