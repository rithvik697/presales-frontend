<!-- PrimeNG Global Toast -->
<p-toast position="top-center"></p-toast>

<!-- ✅ PrimeNG Confirm Dialog (GLOBAL) -->
<p-confirmDialog></p-confirmDialog>

<!-- Show toolbar and sidenav only if NOT on login or change-password page -->
<ng-container *ngIf="!isLoginPage && !isChangePasswordPage && !isForgotPasswordPage && !isResetPasswordPage">
  <div class="crm" (mouseleave)="showLogout = false">

    <!-- ===================== TOOLBAR ===================== -->
    <mat-toolbar class="app-toolbar">

      <button
        mat-icon-button
        class="menu-toggle"
        (click)="toggleSidebar(sidenav)"
      >
        <mat-icon>menu</mat-icon>
      </button>

      <!-- LOGO -->
      <img
        src="assets/tagfinal-logo.png"
        alt="Logo"
        class="logo"
      />

      <span class="spacer"></span>

      <!-- ===================== NOTIFICATIONS ===================== -->
      <div
        class="notification-wrapper"
        (click)="toggleNotifications()"
      >
        <mat-icon class="notification-icon">notifications</mat-icon>

        <!-- Notification Count Badge -->
        <span class="notification-badge" *ngIf="unreadCount">
          {{ unreadCount }}
        </span>

        <!-- Notification Dropdown -->
        <div
          class="notification-dropdown"
          *ngIf="showNotificationDropdown"
          (click)="$event.stopPropagation()"
        >

          <div *ngIf="notifications.length; else noNotification">

            <div
              *ngFor="let note of notifications"
              class="notification-item"
            >
              <div class="notification-title">
                {{ note.title }}
              </div>

              <div class="notification-message">
                {{ note.message }}
              </div>

              <div class="notification-time">
                {{ note.created_on | date:'short' }}
              </div>
            </div>

            <button
              mat-flat-button
              class="mark-read-btn"
              (click)="markAllAsRead()"
            >
              Mark all as read
            </button>

          </div>

          <ng-template #noNotification>
            <div class="notification-item no-data">
              No new notifications
            </div>
          </ng-template>

        </div>
      </div>

      <!-- ===================== PROFILE DROPDOWN ===================== -->
      <div
        *ngIf="username"
        class="profile-container"
        (click)="profileMenu.toggle($event)"
      >
        <div class="profile-section">
          <mat-icon class="profile-icon">account_circle</mat-icon>
          <mat-icon class="dropdown-arrow">keyboard_arrow_down</mat-icon>
        </div>

        <!-- PrimeNG Menu -->
        <p-menu
          #profileMenu
          [model]="profileMenuItems"
          [popup]="true"
          appendTo="body"
          styleClass="profile-dropdown-menu"
        >
          <ng-template pTemplate="start">
            <div class="profile-menu-header">
              <div class="user-info">
                <mat-icon class="user-avatar">account_circle</mat-icon>
                <div class="user-details">
                  <span class="user-name">{{ fullName || username }}</span>
                  <span class="user-role">{{ role || 'User' }}</span>
                </div>
              </div>
            </div>
          </ng-template>
        </p-menu>
      </div>

    </mat-toolbar>

    <!-- ===================== SIDENAV LAYOUT ===================== -->
    <mat-sidenav-container class="sidenav-container">

      <!-- SIDEBAR -->
      <mat-sidenav
        #sidenav
        [mode]="isDesktop ? 'side' : 'over'"
        [opened]="isDesktop"
        class="sidenav"
      >
        <mat-nav-list class="sidebarbg">
          <mat-list-item
            *ngFor="let item of menuItems"
            [routerLink]="item.route"
            (click)="selectItem(item.label)"
            [ngClass]="{ 'active-item': selectedItem === item.label }"
            class="menu-item-wrapper"
          >
            <div class="menu-item-content">
              <mat-icon class="menu-icon">
                {{ item.icon }}
              </mat-icon>
              <span class="menu-label">
                {{ item.label }}
              </span>
            </div>
          </mat-list-item>
        </mat-nav-list>
      </mat-sidenav>

      <!-- ===================== MAIN CONTENT ===================== -->
      <mat-sidenav-content class="content">

        <!-- GLOBAL BREADCRUMB -->
        <div class="breadcrumb-wrapper" *ngIf="breadcrumbs.length">
          <p-breadcrumb
            [model]="breadcrumbs"
            [home]="home"
          ></p-breadcrumb>
        </div>

        <!-- PAGE CONTENT -->
        <router-outlet></router-outlet>

      </mat-sidenav-content>

    </mat-sidenav-container>

  </div>
</ng-container>

<!-- ===================== LOGIN / CHANGE PASSWORD ===================== -->
<ng-container *ngIf="isLoginPage || isChangePasswordPage || isForgotPasswordPage || isResetPasswordPage">
  <router-outlet></router-outlet>
</ng-container>
