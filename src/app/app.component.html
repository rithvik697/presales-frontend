<!-- Show toolbar and sidenav only if NOT on login or change-password page -->
<ng-container *ngIf="!isLoginPage && !isChangePasswordPage">
  <div class="crm" (mouseleave)="showLogout = false">

    <!-- ===================== TOOLBAR ===================== -->
    <mat-toolbar
      class="app-toolbar"
    >
      <button
        mat-icon-button
        class="menu-toggle"
        (click)="toggleSidebar(sidenav)"
      >
        <mat-icon>menu</mat-icon>
      </button>

      <!-- LOGO -->
      <img
        src="assets/tagfinal-logo.png"
        alt="Logo"
        class="logo"
      />

      <span class="spacer"></span>

      <!-- NOTIFICATIONS -->
      <div
        class="notification-wrapper"
        (click)="showNotificationDropdown = !showNotificationDropdown"
      >
        <mat-icon class="notification-icon">notifications</mat-icon>
        <span class="notification-badge" *ngIf="unreadCount">
          {{ unreadCount }}
        </span>

        <div class="notification-dropdown" *ngIf="showNotificationDropdown">
          <div *ngIf="notifications.length; else noNotification">
            <div
              *ngFor="let note of notifications"
              class="notification-item"
            >
              {{ note.message }}
            </div>
            <button
              mat-flat-button
              class="mark-read-btn"
              (click)="markAllAsRead()"
            >
              Mark all as read
            </button>
          </div>

          <ng-template #noNotification>
            <div class="notification-item no-data">
              No new notifications
            </div>
          </ng-template>
        </div>
      </div>

      <!-- SETTINGS -->
      <mat-icon class="icon">settings</mat-icon>

      <!-- PROFILE -->
    <div
      *ngIf="username"
      class="profile-container"
      (click)="showLogout = !showLogout"
      >
      <div class="profile-section">
      <span class="profile-text">{{ username }}</span>
      <img
      src="assets/profile.avif"
      alt="Profile"
      class="imageprofile"
      />
      </div>

      <div
      *ngIf="showLogout"
      class="logout-dropdown"
      >
          <div (click)="logout(); $event.stopPropagation()">
          Logout
        </div>
        </div>
      </div>

    </mat-toolbar>

    <!-- ===================== SIDENAV LAYOUT ===================== -->
    <mat-sidenav-container class="sidenav-container">

      <!-- SIDEBAR -->
      <mat-sidenav
        #sidenav
        [mode]="isDesktop ? 'side' : 'over'"
        [opened]="isDesktop"
        class="sidenav"
      >
        <mat-nav-list class="sidebarbg">
          <mat-list-item
            *ngFor="let item of menuItems"
            [routerLink]="item.route"
            (click)="selectItem(item.label)"
            [ngClass]="{ 'active-item': selectedItem === item.label }"
            class="menu-item-wrapper"
          >
            <div class="menu-item-content">
              <mat-icon class="menu-icon">
                {{ item.icon }}
              </mat-icon>
              <span class="menu-label">
                {{ item.label }}
              </span>
            </div>
          </mat-list-item>
        </mat-nav-list>
      </mat-sidenav>

      <!-- ===================== MAIN CONTENT ===================== -->
      <mat-sidenav-content class="content">

        <!-- GLOBAL BREADCRUMB -->
        <div class="breadcrumb-wrapper" *ngIf="breadcrumbs?.length">
          <p-breadcrumb
            [model]="breadcrumbs"
            [home]="home"
          ></p-breadcrumb>
        </div>

        <!-- PAGE CONTENT -->
        <router-outlet></router-outlet>

      </mat-sidenav-content>
    </mat-sidenav-container>
  </div>
</ng-container>

<!-- ===================== LOGIN / CHANGE PASSWORD ===================== -->
<ng-container *ngIf="isLoginPage || isChangePasswordPage">
  <router-outlet></router-outlet>
</ng-container>
