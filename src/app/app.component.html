<!-- Show toolbar and sidenav only if NOT on login or change-password page -->
<ng-container *ngIf="!isLoginPage && !isChangePasswordPage">
  <div class="crm" (mouseleave)="showLogout = false">

    <mat-toolbar style="background-color: white; display: flex; align-items: center; height: 100px;">

      <img src="assets/tagfinal-logo.png" alt="Logo" class="logo" style="height: 50px;" />
      <span class="spacer"></span>

      <div class="search-container" style="display: none;">
        <mat-form-field appearance="outline" class="search-bar">
          <mat-label>Search</mat-label>
          <input matInput type="text" />
          <button mat-icon-button matSuffix>
            <mat-icon>search</mat-icon>
          </button>
        </mat-form-field>
      </div>

      <div class="notification-wrapper" (click)="showNotificationDropdown = !showNotificationDropdown">
        <mat-icon class="notification-icon">notifications</mat-icon>
        <span class="notification-badge" *ngIf="unreadCount">{{ unreadCount }}</span>

        <div class="notification-dropdown" *ngIf="showNotificationDropdown">
          <div *ngIf="notifications.length; else noNotification">
            <div *ngFor="let note of notifications" class="notification-item">
              {{ note.message }}
            </div>
            <button mat-flat-button class="mark-read-btn" (click)="markAllAsRead()">Mark all as read</button>
          </div>
          <ng-template #noNotification>
            <div class="notification-item no-data">No new notifications</div>
          </ng-template>
        </div>
      </div>

      <mat-icon class="icon">settings</mat-icon>

      <!-- ✅ Profile & Logout only shown when username is present -->
      <div
        *ngIf="username"
        class="profile-container"
        (mouseenter)="showLogout = true"
        (mouseleave)="showLogout = false"
      >
        <div class="profile-section">
          <span class="profile-text">{{ username }}</span>
          <img src="assets/profile.avif" alt="Profile" class="imageprofile" />
        </div>

        <!-- ✅ Show logout ONLY when user is logged in AND hovering -->
        <div *ngIf="showLogout" class="logout-dropdown" (click)="logout()">
          Logout
        </div>
      </div>

      <button mat-icon-button (click)="toggleSidebar(sidenav)" class="mobile-menu">
        <mat-icon>menu</mat-icon>
      </button>

    </mat-toolbar>

    <mat-sidenav-container class="sidenav-container">
      <mat-sidenav #sidenav [mode]="isDesktop ? 'side' : 'over'" [opened]="isDesktop" class="sidenav">
        <mat-nav-list class="sidebarbg">
          <mat-list-item 
            *ngFor="let item of menuItems" 
            [routerLink]="item.route" 
            (click)="selectItem(item.label)"
            [ngClass]="{'active-item': selectedItem === item.label}"
            class="menu-item-wrapper"
          >
            <div class="menu-item-content">
              <mat-icon class="menu-icon">{{ item.icon }}</mat-icon>
              <span class="menu-label">{{ item.label }}</span>
            </div>
          </mat-list-item>
        </mat-nav-list>
      </mat-sidenav>

      <mat-sidenav-content class="content">
        <router-outlet></router-outlet>
      </mat-sidenav-content>
    </mat-sidenav-container>

  </div>
</ng-container>

<!-- Show only login or change-password content -->
<ng-container *ngIf="isLoginPage || isChangePasswordPage">
  <router-outlet></router-outlet>
</ng-container>
