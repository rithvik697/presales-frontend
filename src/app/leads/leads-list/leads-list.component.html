<div class="page-container">

  <!-- Breadcrumb -->
  <p-breadcrumb [model]="breadcrumbItems" [home]="home" class="mb-3">
  </p-breadcrumb>

  <!-- Toolbar -->
  <p-toolbar class="mb-3">
    <div class="p-toolbar-group-left">
      <h2 class="m-0">Leads Management</h2>
    </div>

    <div class="p-toolbar-group-right">
      <div class="flex gap-2">
        <button pButton label="Lead-Filter View" icon="pi pi-search" class="p-button-help" (click)="toggleFilterView()">
        </button>
        <button pButton label="Create Lead" icon="pi pi-plus" class="p-button-primary" (click)="goToCreate()">
        </button>
      </div>
    </div>
  </p-toolbar>

  <!-- Filter Panel -->
  <div *ngIf="showFilterView" class="card mb-4 surface-ground border-round-md p-3">
    <form [formGroup]="filterForm">
      <div class="formgrid grid">
        <!-- Row 1 -->
        <div class="field col-12 md:col-6 lg:col-2">
          <label class="font-semibold" for="customerName">Customer Name</label>
          <input pInputText id="customerName" formControlName="customerName" placeholder="Search name..."
            class="w-full" />
        </div>
        <div class="field col-12 md:col-6 lg:col-2">
          <label class="font-semibold" for="mobileNumber">Mobile Number</label>
          <input pInputText id="mobileNumber" formControlName="mobileNumber" placeholder="Search phone..."
            class="w-full" />
        </div>
        <div class="field col-12 md:col-6 lg:col-2">
          <label class="font-semibold" for="source">Source</label>
          <p-dropdown [options]="sourceOptions" formControlName="source" placeholder="All" cssClass="w-full"
            styleClass="w-full" [showClear]="true"></p-dropdown>
        </div>
        <div class="field col-12 md:col-6 lg:col-2">
          <label class="font-semibold" for="project">Project</label>
          <p-dropdown [options]="projectOptions" formControlName="project" placeholder="All" styleClass="w-full"
            [showClear]="true"></p-dropdown>
        </div>
        <div class="field col-12 md:col-6 lg:col-2">
          <label class="font-semibold" for="status">Activity Status</label>
          <p-dropdown [options]="statusOptions" formControlName="status" placeholder="All" styleClass="w-full"
            [showClear]="true"></p-dropdown>
        </div>

        <!-- Row 2 / Continued Flow -->
        <div class="field col-12 md:col-6 lg:col-2">
          <label class="font-semibold" for="assignedEmployee">Assigned To</label>
          <p-dropdown [options]="employeeOptions" formControlName="assignedEmployee" placeholder="All"
            styleClass="w-full" [showClear]="true"></p-dropdown>
        </div>

        <div class="field col-12 md:col-6 lg:col-2">
          <label class="font-semibold" for="fromDate">From Date</label>
          <input pInputText type="date" id="fromDate" formControlName="fromDate" class="w-full" />
        </div>

        <div class="field col-12 md:col-6 lg:col-2">
          <label class="font-semibold" for="toDate">To Date</label>
          <input pInputText type="date" id="toDate" formControlName="toDate" class="w-full" />
        </div>



        <!-- Actions -->
        <div class="field col-12 md:col-6 lg:col-4 flex align-items-end gap-2">
          <button pButton label="Apply Filters" icon="pi pi-check" class="p-button-success"
            (click)="applyFilters()"></button>
          <button pButton label="Clear Filters" icon="pi pi-times" class="p-button-secondary p-button-outlined"
            (click)="clearFilters()"></button>
        </div>
      </div>
    </form>
  </div>

  <!-- Scroll Wrapper -->
  <div class="table-wrapper">

    <p-table #dt *ngIf="!loading" [value]="filteredLeads" [rows]="10" [paginator]="true" sortMode="multiple"
      class="leads-table" [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords}">

      <ng-template pTemplate="caption">
        <div class="flex align-items-center justify-content-between">
          <div class="flex align-items-center gap-2">
            <h5 class="m-0">Manage Leads</h5>
          </div>

          <div class="flex align-items-center gap-2">
            <!-- Dynamic Column Picker -->
            <button pButton icon="pi pi-list" class="p-button-rounded p-button-info p-button-text"
              (click)="toggleColumnPicker()" title="Show/Hide Columns"></button>
          </div>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th style="width: 4rem" class="text-center">Sl No</th>
          <th *ngFor="let col of activeCols" [pSortableColumn]="col.field">
            {{ col.header }}
            <p-sortIcon [field]="col.field"></p-sortIcon>
          </th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-lead let-i="rowIndex">
        <tr>
          <td>{{ i + 1 }}</td>
          <td *ngFor="let col of activeCols">
            <!-- Custom Cell Rendering based on field -->
            <ng-container [ngSwitch]="col.field">
              <!-- Name with View Link -->
              <span *ngSwitchCase="'name'" class="text-primary cursor-pointer font-bold underline"
                (click)="viewLead(lead)">
                {{ lead.name }}
              </span>

              <!-- Status with Tag -->
              <p-tag *ngSwitchCase="'status'" [value]="lead.status" [severity]="getSeverity(lead.status)"></p-tag>

              <!-- Phone with formatting -->
              <span *ngSwitchCase="'phone'">{{ lead.phone | phoneDisplay }}</span>

              <!-- Alternate Phone -->
              <span *ngSwitchCase="'alternatePhone'">{{ lead.alternatePhone | phoneDisplay }}</span>

              <!-- Remarks/Description -->
              <span *ngSwitchCase="'description'">{{ lead.description || '-' }}</span>

              <!-- Actions -->
              <div *ngSwitchCase="'actions'" class="flex gap-2">
                <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-success p-button-sm"
                  (click)="edit(lead)" title="Edit"></button>
              </div>

              <!-- Default Text -->
              <span *ngSwitchDefault>{{ lead[col.field] || '-' }}</span>
            </ng-container>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td [attr.colspan]="activeCols.length + 1" class="text-center p-4">No leads found.</td>
        </tr>
      </ng-template>

    </p-table>

  </div>


  <!-- Column Picker Dialog -->
  <p-dialog header="Choose Display Columns" [(visible)]="showColumnPicker" [modal]="true" [style]="{width: '350px'}"
    appendTo="body" styleClass="column-picker-dialog">

    <div class="flex justify-content-between align-items-center mb-3 pb-2 border-bottom-1 surface-border">
      <span class="text-sm font-semibold text-600">Toggle Fields</span>
      <div class="flex gap-2">
        <button pButton label="All" class="p-button-text p-button-sm p-0" (click)="selectAllColumns()"></button>
        <button pButton label="None" class="p-button-text p-button-sm p-0 p-button-danger"
          (click)="unselectAllColumns()"></button>
      </div>
    </div>

    <div class="flex flex-column gap-3 py-2 max-h-20rem overflow-y-auto">
      <div *ngFor="let col of allOptionalCols" class="field-checkbox">
        <p-checkbox name="group1" [value]="col" [(ngModel)]="selectedOptionalCols" [inputId]="col.field"
          [label]="col.header"></p-checkbox>
      </div>
    </div>

    <ng-template pTemplate="footer">
      <div class="flex gap-2 w-full">
        <button pButton label="Reset Defaults" icon="pi pi-refresh" (click)="resetColumns()"
          class="p-button-outlined p-button-secondary flex-1"></button>
        <button pButton label="Apply" icon="pi pi-check" (click)="applyColumns()"
          class="p-button-primary flex-1"></button>
      </div>
    </ng-template>
  </p-dialog>
</div>
