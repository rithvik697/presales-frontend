<div class="form-page">
  <div class="form-card">

    <!-- ================= HEADER ================= -->
    <div class="form-header">

      <!-- Back Arrow -->
      <button mat-icon-button class="back-btn" (click)="goBack()" aria-label="Back to Users">
        <mat-icon>arrow_back</mat-icon>
      </button>

      <!-- Centered Title -->
      <div class="title-wrapper">
        <h2>{{ isEditMode ? 'Edit User' : 'User Registration' }}</h2>
        <p class="subtitle">
          {{
          isEditMode
          ? 'Update employee user information'
          : 'Create a new employee user with complete information'
          }}
        </p>
      </div>

      <div></div>
    </div>

    <!-- ================= FORM ================= -->
    <form (ngSubmit)="submit()" #userForm="ngForm">

      <div class="form-grid">

        <!-- Employee ID -->
        <div class="form-group">
          <label>
            Employee ID <span class="required">*</span>
          </label>
          <input type="text" name="emp_id" [(ngModel)]="user.emp_id" required [disabled]="isEditMode" />
        </div>

        <!-- Username -->
        <div class="form-group">
          <label>
            Username <span class="required">*</span>
          </label>
          <input type="text" name="username" [(ngModel)]="user.username" required />
        </div>

        <!-- Email -->
        <div class="form-group">
          <label>
            Email <span class="required">*</span>
          </label>
          <input type="email" name="email" [(ngModel)]="user.email" required />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>
            Password <span class="required" *ngIf="!isEditMode">*</span>
          </label>
          <input type="password" name="password" [(ngModel)]="user.password" [required]="!isEditMode"
            placeholder="{{ isEditMode ? 'Leave blank to keep current' : '' }}" />
        </div>

        <!-- Role -->
        <div class="form-group">
          <label>
            Role <span class="required">*</span>
          </label>
          <select name="role_id" [(ngModel)]="user.role_id" required>
            <option value="">Select Role</option>
            <option value="ADMIN">Admin</option>
            <option value="SALES_EXEC">Sales Executive</option>
            <option value="SALES_MGR">Sales Manager</option>
          </select>
        </div>

        <!-- First Name -->
        <div class="form-group">
          <label>
            First Name <span class="required">*</span>
          </label>
          <input type="text" name="emp_first_name" [(ngModel)]="user.emp_first_name" required />
        </div>

        <!-- Last Name -->
        <div class="form-group">
          <label>
            Last Name <span class="required">*</span>
          </label>
          <input type="text" name="emp_last_name" [(ngModel)]="user.emp_last_name" required />
        </div>

        <!-- Middle Name -->
        <div class="form-group">
          <label>Middle Name</label>
          <input type="text" name="emp_middle_name" [(ngModel)]="user.emp_middle_name" />
        </div>

        <!-- Status -->
        <div class="form-group">
          <label>
            Status <span class="required">*</span>
          </label>
          <select name="emp_status" [(ngModel)]="user.emp_status" required>
            <option value="">Select Status</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>

      </div>

      <!-- ================= ACTIONS ================= -->
      <div class="form-actions">
        <button type="submit" class="primary-btn">
          {{ isEditMode ? 'Update User' : 'Create User' }}
        </button>

        <button type="button" class="secondary-btn" (click)="cancel()">
          Cancel
        </button>
      </div>

    </form>
  </div>
</div>
