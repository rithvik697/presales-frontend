<div class="form-page">
  <div class="form-card">

    <!-- ================= HEADER ================= -->
    <div class="form-header">

      <!-- Back Arrow -->
      <button
        mat-icon-button
        class="back-btn"
        (click)="goBack()"
        aria-label="Back to Users"
      >
        <mat-icon>arrow_back</mat-icon>
      </button>

      <!-- Centered Title -->
      <div class="title-wrapper">
        <h2>User Registration</h2>
        <p class="subtitle">
          Create a new employee user with complete information
        </p>
      </div>

      <!-- Spacer (balances flex layout) -->
      <div class="header-spacer"></div>

    </div>

    <!-- ================= FORM ================= -->
    <form (ngSubmit)="submit()" #userForm="ngForm">

      <div class="form-grid">

        <!-- Employee ID -->
        <div class="form-group">
          <input
            type="text"
            name="emp_id"
            [(ngModel)]="user.emp_id"
            placeholder="Employee ID **"
            required
          />
        </div>

        <!-- Role -->
        <div class="form-group">
          <select
            name="role_id"
            [(ngModel)]="user.role_id"
            required
          >
            <option value="">Role **</option>
            <option value="ADMIN">Admin</option>
            <option value="SALES_EXEC">Sales Executive</option>
            <option value="SALES_MGR">Sales Manager</option>
          </select>
        </div>

        <!-- First Name -->
        <div class="form-group">
          <input
            type="text"
            name="emp_first_name"
            [(ngModel)]="user.emp_first_name"
            placeholder="First Name **"
            required
          />
        </div>

        <!-- Last Name -->
        <div class="form-group">
          <input
            type="text"
            name="emp_last_name"
            [(ngModel)]="user.emp_last_name"
            placeholder="Last Name **"
            required
          />
        </div>

        <!-- Middle Name -->
        <div class="form-group">
          <input
            type="text"
            name="emp_middle_name"
            [(ngModel)]="user.emp_middle_name"
            placeholder="Middle Name"
          />
        </div>

        <!-- Status -->
        <div class="form-group">
          <select
            name="emp_status"
            [(ngModel)]="user.emp_status"
            required
          >
            <option value="">Status **</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>

      </div>

      <!-- ================= ACTIONS ================= -->
      <div class="form-actions">
        <button type="submit" class="primary-btn">
          Create User
        </button>

        <button
          type="button"
          class="secondary-btn"
          (click)="cancel()"
        >
          Cancel
        </button>
      </div>

    </form>
  </div>
</div>
