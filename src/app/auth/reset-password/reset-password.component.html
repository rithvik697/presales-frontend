<div class="login-page">
  <div class="login-card">

    <!-- LOGO -->
    <div class="login-logo">
      <img src="assets/tagfinal-logo.png" alt="TAG Logo" />
    </div>

    <h2 class="login-title">Reset Password</h2>

    <form [formGroup]="resetForm" (ngSubmit)="resetPassword()">

      <!-- New Password -->
      <mat-form-field appearance="fill" class="full-width custom-field">
        <mat-label>New Password</mat-label>
        <input matInput type="password" formControlName="password" />
      </mat-form-field>

      <!-- Confirm Password -->
      <mat-form-field appearance="fill" class="full-width custom-field">
        <mat-label>Confirm Password</mat-label>
        <input matInput type="password" formControlName="confirmPassword" />
       </mat-form-field>

      <!-- Password strength checklist -->
      <div class="pw-checklist" *ngIf="resetForm.get('password')?.value">
        <div [class.pw-ok]="passwordChecks.length"  [class.pw-fail]="!passwordChecks.length">
          <i class="pi" [class.pi-check-circle]="passwordChecks.length" [class.pi-times-circle]="!passwordChecks.length"></i> At least 8 characters
        </div>
        <div [class.pw-ok]="passwordChecks.upper"   [class.pw-fail]="!passwordChecks.upper">
          <i class="pi" [class.pi-check-circle]="passwordChecks.upper" [class.pi-times-circle]="!passwordChecks.upper"></i> One uppercase letter
        </div>
        <div [class.pw-ok]="passwordChecks.lower"   [class.pw-fail]="!passwordChecks.lower">
          <i class="pi" [class.pi-check-circle]="passwordChecks.lower" [class.pi-times-circle]="!passwordChecks.lower"></i> One lowercase letter
        </div>
        <div [class.pw-ok]="passwordChecks.number"  [class.pw-fail]="!passwordChecks.number">
          <i class="pi" [class.pi-check-circle]="passwordChecks.number" [class.pi-times-circle]="!passwordChecks.number"></i> One number
        </div>
        <div [class.pw-ok]="passwordChecks.special" [class.pw-fail]="!passwordChecks.special">
          <i class="pi" [class.pi-check-circle]="passwordChecks.special" [class.pi-times-circle]="!passwordChecks.special"></i> One special character (@$!%*?&amp;#)
        </div>
      </div>

      <!-- SUCCESS -->
      <div class="success-text" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <!-- ERROR -->
      <div class="error-text" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        class="login-btn"
        [disabled]="isLoading || resetForm.invalid">

        {{ isLoading ? 'Resetting...' : 'Reset Password' }}

      </button>

      <!-- BACK TO LOGIN -->
      <div class="login-links">
        <a routerLink="/login">Back to Login</a>
      </div>

    </form>

  </div>
</div>
