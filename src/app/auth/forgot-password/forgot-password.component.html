<div class="login-page">
  <div class="login-card">

    <!-- LOGO -->
    <div class="login-logo">
      <img src="assets/tagfinal-logo.png" alt="TAG Logo" />
    </div>

    <h2 class="login-title">Forgot Password</h2>

    <form [formGroup]="forgotForm" (ngSubmit)="sendResetLink()">

      <!-- Email -->
      <mat-form-field appearance="fill" class="full-width custom-field">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <!-- SUCCESS MESSAGE -->
      <div class="success-text" *ngIf="message">
        {{ message }}
      </div>

      <!-- ERROR -->
      <div class="error-text" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        class="login-btn"
        [disabled]="isLoading || forgotForm.invalid">

        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}

      </button>

      <!-- BACK TO LOGIN -->
      <div class="login-links">
        <a routerLink="/login">Back to Login</a>
      </div>

    </form>

  </div>
</div>
